<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mohamed ❤️ Sara</title>

<link rel="stylesheet" href="Style.css">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div id="intro">
    <h1>Mohamed ❤️ Sara</h1>
    <p>Click Anywhere ❤️</p>
</div>

<div id="hearts"></div>

<div class="container">

<h1 class="title">
Mohamed ❤️ Sara
</h1>

<img src="photo.jpeg" class="main-photo">

<h2 class="love-text">
Every Love Story Is Beautiful,
But Ours Is My Favorite ❤️
</h2>

<div class="counter">

<div class="box">
<span id="days">0</span>
<p>Days</p>
</div>

<div class="box">
<span id="hours">0</span>
<p>Hours</p>
</div>

<div class="box">
<span id="minutes">0</span>
<p>Minutes</p>
</div>

<div class="box">
<span id="seconds">0</span>
<p>Seconds</p>
</div>

</div>

<audio controls autoplay loop>

<source src="song2.mp3" type="audio/mpeg">

</audio>

<div class="message" id="typing"></div>

<div class="gallery">

<img src="1.jpeg">

<img src="2.jpeg">

<img src="3.jpeg">

<img src="4.jpeg">

</div>

<div class="cards">

<div class="card">Your Eyes 👀</div>

<div class="card">Your Smile 😊</div>

<div class="card">Everything About You ❤️</div>

<div class="card">Your Crazy Side 🤪</div>

</div>

</div>

<script src="Script.js"></script>
<script>
const intro = document.getElementById("intro");

intro.addEventListener("click", function () {
    intro.classList.add("hide");

    const audio = document.querySelector("audio");
    if(audio){
        audio.play();
    }

    startHearts();
});

function startHearts(){

    const container = document.getElementById("hearts");

    setInterval(()=>{

        const heart=document.createElement("div");

        heart.className="heart";

        heart.innerHTML="❤";

        heart.style.left=Math.random()*100+"vw";

        heart.style.fontSize=(18+Math.random()*20)+"px";

        heart.style.animationDuration=(5+Math.random()*4)+"s";

        container.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },9000);

    },350);

}
</script>
</body>
</html>
